name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Test, lint & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify modules
        run: go mod verify

      - name: Test
        run: go test ./... -cover

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Build static binary
        run: make build

      - name: Smoke-test the binary
        run: ./dist/playbill --version

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          build-args: |
            VERSION=${{ github.sha }}
